name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

jobs:
  test-and-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit and use-case coverage
        run: npm run test:ci

      - name: Dependency vulnerability gate
        run: npm audit --audit-level=low

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: Upload JUnit artifact
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: test-results/junit

      - name: SonarCloud scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: SonarCloud skipped notice
        if: env.SONAR_TOKEN == ''
        run: echo "⚠️ SONAR_TOKEN is not configured — SonarCloud scan skipped. Add it as a repository secret."
