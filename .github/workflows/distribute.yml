name: Firebase App Distribution

# Triggers only on push to main (merge or direct push)
on:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch
concurrency:
  group: firebase-distribute-${{ github.ref }}
  cancel-in-progress: true

jobs:
  distribute:
    name: Build & Distribute Signed APK
    runs-on: ubuntu-latest

    env:
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

    # Only run if signing secrets are configured
    # This allows the workflow file to exist without failing when secrets are missing
    if: ${{ vars.FIREBASE_TESTER_GROUPS != '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: |
          npm run lint
          npm run test:quality

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not configured. Building debug APK instead."
            echo "SIGN_MODE=debug" >> $GITHUB_ENV
          else
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/mbc-release.keystore
            echo "SIGN_MODE=release" >> $GITHUB_ENV
          fi

      - name: Build signed release APK
        if: env.SIGN_MODE == 'release'
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PMBC_STORE_FILE=mbc-release.keystore \
            -PMBC_STORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PMBC_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PMBC_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

      - name: Build debug APK (fallback)
        if: env.SIGN_MODE == 'debug'
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Determine APK path
        id: apk
        run: |
          if [ "${{ env.SIGN_MODE }}" = "release" ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          else
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          echo "path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK path: $APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mbc-signed-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Generate release notes
        id: notes
        run: |
          cat <<EOF > release-notes.txt
          KDX Membership Benefit Card — ${{ env.SIGN_MODE }} build

          Branch: main
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}
          Date: $(date -u +"%Y-%m-%d %H:%M UTC")

          Build type: ${{ env.SIGN_MODE }}
          Quality: lint ✓ | tests ✓

          Demo roles: Station, Gate, Terminal, Scout
          Package: com.mbcnfc
          EOF

      - name: Publish to Firebase App Distribution
        if: env.FIREBASE_APP_ID != '' && env.FIREBASE_SERVICE_ACCOUNT != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: ${{ vars.FIREBASE_TESTER_GROUPS }}
          file: ${{ steps.apk.outputs.path }}
          releaseNotesFile: release-notes.txt

      - name: Distribution status
        if: env.FIREBASE_APP_ID == '' || env.FIREBASE_SERVICE_ACCOUNT == ''
        run: |
          echo "::warning::Firebase App Distribution secrets not fully configured."
          echo "APK was built and uploaded as artifact only."
          echo ""
          echo "To enable Firebase distribution, configure these secrets:"
          echo "  - FIREBASE_APP_ID"
          echo "  - FIREBASE_SERVICE_ACCOUNT"
          echo ""
          echo "See .codex/specs/FIREBASE_DISTRIBUTION_SETUP.md for instructions."

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/mbc-release.keystore
