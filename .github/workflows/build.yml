name: Firebase App Distribution

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: firebase-distribution-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    needs:
      - vulnerability_scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --coverage

      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}

  unit_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit Test
        run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  vulnerability_scan:
    runs-on: ubuntu-latest
    needs:
      - unit_test
      - lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --omit=dev --audit-level=high

  build_apk:
    runs-on: ubuntu-latest
    needs:
      - sonarcloud
      - unit_test
      - lint
      - vulnerability_scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Preflight secret check (build)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          missing=0
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::Missing required secret: GOOGLE_SERVICES_JSON"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/build.gradle', 'android/app/build.gradle', 'android/settings.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Set Gradlew Permissions
        run: chmod +x android/gradlew

      - name: Bundle JS for distributable debug APK
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Generate debug keystore for CI
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Create Google Services JSON File
        env:
          GOOGLE_SERVICES_JSON: ${{secrets.GOOGLE_SERVICES_JSON}}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" | base64 --decode > ./android/app/google-services.json

      - name: Build application
        run: |
          cd ./android
          ./gradlew assembleDebug --parallel --build-cache --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Build job summary
        run: |
          {
            echo "## Build Summary"
            echo ""
            echo "- Workflow: \`${{ github.workflow }}\`"
            echo "- Branch/Ref: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- APK artifact: \`debug-apk\`"
          } >> "$GITHUB_STEP_SUMMARY"

  distribute_apk:
    runs-on: ubuntu-latest
    needs:
      - build_apk
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Preflight secret check (distribution)
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          missing=0
          if [ -z "$FIREBASE_APP_ID" ]; then
            echo "::error::Missing required secret: FIREBASE_APP_ID"
            missing=1
          fi
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Missing required secret: FIREBASE_SERVICE_ACCOUNT_JSON"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug

      - name: Generate release notes
        id: release_notes
        run: |
          {
            echo "notes<<EOF"
            echo "MBC NFC debug distribution"
            echo ""
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Ref: ${{ github.ref_name }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact to Firebase App Distribution
        id: testing_outputs
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.FIREBASE_APP_ID}}
          serviceCredentialsFileContent: ${{secrets.FIREBASE_SERVICE_ACCOUNT_JSON}}
          groups: testers
          file: android/app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: ${{ steps.release_notes.outputs.notes }}

      - name: Distribution job summary
        run: |
          {
            echo "## Distribution Summary"
            echo ""
            echo "- Artifact: \`android/app/build/outputs/apk/debug/app-debug.apk\`"
            echo "- Release notes: generated from workflow metadata"
          } >> "$GITHUB_STEP_SUMMARY"
