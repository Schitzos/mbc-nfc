name: Firebase App Distribution

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - develop
  push:
    branches:
      - develop
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: firebase-distribution-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}

  unit_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit Test
        run: npm test

  build_and_distribute_apk:
    runs-on: ubuntu-latest
    needs:
      - sonarcloud
      - unit_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Set Gradlew Permissions
        run: chmod +x android/gradlew

      - name: Generate debug keystore for CI
        run: |
          if [ ! -f android/app/debug.keystore ]; then
            keytool -genkeypair \
              -v \
              -storetype PKCS12 \
              -keystore android/app/debug.keystore \
              -storepass android \
              -keypass android \
              -alias androiddebugkey \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Create Google Services JSON File
        env:
          GOOGLE_SERVICES_JSON: ${{secrets.GOOGLE_SERVICES_JSON}}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" | base64 --decode > ./android/app/google-services.json

      - name: Build application
        run: |
          cd ./android
          ./gradlew assembleDebug --parallel --build-cache --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: Build
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload artifact to Firebase App Distribution
        id: testing_outputs
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.FIREBASE_APP_ID}}
          serviceCredentialsFileContent: ${{secrets.FIREBASE_SERVICE_ACCOUNT_JSON}}
          groups: testers
          file: android/app/build/outputs/apk/debug/app-debug.apk
